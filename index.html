<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

 
  <aside class="sidebar">

    <div class="brand">
      Dashboard
    </div>

    <nav class="nav-main">
      <ul>
        <li>🏠 Home</li>
        <li>👤 Profile</li>
        <li>💬 Messages</li>
        <li>📁 History</li>
        <li>📝 Tasks</li>
        <li>👥 Communities</li>
      </ul>
    </nav>

    <nav class="nav-secondary">
      <ul>
        <li>⚙️ Settings</li>
        <li>❓ Support</li>
        <li>🔒 Privacy</li>
      </ul>
    </nav>

  </aside>

  
  <header class="header">

    <div class="search">
      <input type="text" placeholder="Search...">
    </div>

    <div class="header-right">
      <span>🔔</span>
      <span class="user">John Doe</span>
    </div>

  </header>

  
  <main class="main-content">

    
    <section class="projects">

      <h2>Your Projects</h2>

      <div class="project-grid">

        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
        <div class="card">Project 4</div>
        <div class="card">Project 5</div>
        <div class="card">Project 6</div>

      </div>

    </section>

    
    <aside class="side-panel">

      <div class="announcements">
        <h3>Announcements</h3>
        <p>Site maintenance</p>
        <p>New update</p>
      </div>

      <div class="trending">
        <h3>Trending</h3>
        <p>@user1</p>
        <p>@user2</p>
      </div>

    </aside>

  </main>

</div>

</body>
</html>
